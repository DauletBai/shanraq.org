{{ define "header"}}
<header class="lh-1 py-3">
    <div class="row flex-nowrap align-items-center">
      <div class="col-5 text-start">
        <a class="link-secondary" href="#">
          <div class="p-4 mb-3 text-body-emphasis bg-body-tertiary rounded border">
            <h4 class="fst-normal">Advertising banner</h4>
            <p class="mb-0"><Tarea:cr>
            </Tarea:cr>Tell us a little about your company.</p>
          </div>
        </a>
      </div>
      <div class="col-2 text-center p-0">
        <a class="blog-header-logo text-body-emphasis text-decoration-none" href="#">
          <img src="assets/brand/logo.png" width="70" alt="logotype" title="Shanraq">
        </a>
      </div>
      <div class="col-5 text-end">
        <a class="link-secondary" href="#">
          <div class="p-4 mb-3 text-body-emphasis bg-body-tertiary rounded border">
            <h4 class="fst-normal">Advertising banner</h4>
            <p class="mb-0"><Tarea:cr>
            </Tarea:cr>Tell us a little about your company.</p>
          </div>
        </a>
      </div>
    </div>
    <div class="row flex-nowrap justify-content-between align-items-center">
      <div class="col-4 pt-1">
        <a class="link-secondary" href="#">Subscribe</a>
      </div>
      <div class="col-4 text-center">
        <a class="blog-header-logo text-body-emphasis text-decoration-none" href="#">News Portal</a>
      </div>
      <div class="col-4 d-flex justify-content-end align-items-center">
        <a class="link-secondary" href="#" aria-label="Search">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" class="mx-3" role="img" viewBox="0 0 24 24"><title>Search</title><circle cx="10.5" cy="10.5" r="7.5"/><path d="M21 21l-5.2-5.2"/></svg>
        </a>
        <a class="link-secondary" href="#">Sign up</a>
      </div>
    </div>
</header>
<div class="nav-scroller py-0 mb-3 border-bottom">
    <nav class="nav nav-underline justify-content-between">
      <a class="nav-item nav-link link-body-emphasis active" href="#"><i class="bi bi-globe2 pe-2"></i>WORLD</a>

      <a class="nav-item nav-link link-body-emphasis" href="#"><i class="bi bi-chat-text pe-2"></i>OPINION</a>

      <a class="nav-item nav-link link-body-emphasis" href="#"><i class="bi bi-heart-pulse pe-2"></i>HEALTH</a>
      <a class="nav-item nav-link link-body-emphasis" href="#"><i class="bi bi-globe-americas pe-2"></i>TRAVEL</a>
      <a class="nav-item nav-link link-body-emphasis" href="#"><i class="bi bi-cloud-sun pe-2"></i>WEATHER</a>
