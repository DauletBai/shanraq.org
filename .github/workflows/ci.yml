name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"; echo "$unformatted"; exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  unit:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: shanraq_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      SHANRAQ_TEST_DB: postgres://postgres:postgres@localhost:5432/shanraq_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      # Apply the real migration set to the service database so the
      # integration tests (skipped without SHANRAQ_TEST_DB) actually run.
      - name: Migrate test database
        run: go run ./cmd/migrate
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/shanraq_test
      - name: Go test
        run: go test ./...
      - name: Go test (race)
        run: go test -race ./...

  snapshots:
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - name: Refresh template snapshots
        run: make snapshots
      - name: Verify no snapshot drift
        run: git diff --exit-code

  # NOTE: the Docker smoke test lives in the dedicated docker-smoke.yml
  # workflow. It used to be duplicated here as a `smoke` job, but that copy
  # flaked intermittently (Docker resource contention alongside the other
  # jobs) and produced false CI failures while docker-smoke.yml stayed green.
  # Keep Docker smoke in one place only.
