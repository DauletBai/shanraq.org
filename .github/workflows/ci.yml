name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"; echo "$unformatted"; exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - name: Go test
        run: go test ./...
      - name: Go test (race)
        run: go test -race ./...

  snapshots:
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - name: Refresh template snapshots
        run: make snapshots
      - name: Verify no snapshot drift
        run: git diff --exit-code

  # NOTE: the Docker smoke test lives in the dedicated docker-smoke.yml
  # workflow. It used to be duplicated here as a `smoke` job, but that copy
  # flaked intermittently (Docker resource contention alongside the other
  # jobs) and produced false CI failures while docker-smoke.yml stayed green.
  # Keep Docker smoke in one place only.
