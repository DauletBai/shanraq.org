environment: development
server:
  address: ":8080"
  read_timeout: 15s
  write_timeout: 15s
  idle_timeout: 60s
database:
  url: postgres://postgres:postgres@127.0.0.1:5432/shanraq?sslmode=disable
  max_conns: 10
  min_conns: 1
  max_conn_lifetime: 30m
  max_conn_idle_time: 5m
  health_check_period: 30s
telemetry:
  enable_metrics: true
  metrics_path: /metrics
logging:
  level: info
  mode: development
auth:
  token_secret: super-secret-key
  token_ttl: 30m
  mfa:
    totp:
      enabled: false
      issuer: Shanraq Console
notifications:
  smtp:
    host: ""
    port: 587
    username: ""
    password: ""
    from: ""
# AI writing assistant (Claude). Stays OFF until enabled AND an API key is set,
# so the app runs with zero AI spend by default. The key can also come from the
# ANTHROPIC_API_KEY environment variable instead of api_key here.
ai:
  enabled: false
  api_key: ""              # or export ANTHROPIC_API_KEY
  editor_model: claude-sonnet-5      # co-editor: quality tone
  translate_model: claude-haiku-4-5  # bulk KZ/RU/EN translation: cheap
  max_tokens: 4096
# Block-resilience channels. RSS (/feed.xml) is always on. Telegram auto-posts
# an announcement on publish once a bot token + channel are set.
syndicate:
  base_url: "http://localhost:8080"   # absolute base for RSS + Telegram links (set your real domain)
  telegram:
    enabled: false
    bot_token: ""          # from @BotFather
    chat_id: ""            # @your_channel or -100XXXXXXXXXX
